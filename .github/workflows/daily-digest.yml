name: Daily Paper Digest

on:
  schedule:
    # 9:00 AM JST = 0:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect-and-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Collect papers and send digest
        run: |
          echo "Triggering paper collection..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/jobs/collect"

          echo "Sending digest emails..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/jobs/digest"
